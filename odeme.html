<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ödeme — Valunorth</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Calibri,sans-serif;background:#F5F4EF;color:#1C2535;min-height:100vh;}
nav{background:#1C2535;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;}
nav a.logo{text-decoration:none;font-size:20px;font-weight:700;color:#fff;}
nav a.logo span{color:#5DCAA5;}
nav a.back{color:#5DCAA5;font-size:13px;text-decoration:none;border:1px solid #5DCAA5;padding:6px 14px;border-radius:99px;}
.container{max-width:480px;margin:48px auto;padding:0 20px 80px;}
.card{background:#fff;border-radius:14px;padding:32px;border:.5px solid #e0dfd8;box-shadow:0 4px 20px rgba(0,0,0,.07);}
.plan-badge{display:inline-block;padding:4px 14px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}
.plan-plus .plan-badge{background:#E8F5F1;color:#0F6E56;}
.plan-pro .plan-badge{background:#EEEDFE;color:#534AB7;}
h1{font-size:24px;font-weight:700;color:#1C2535;margin-bottom:6px;}
.price{font-size:36px;font-weight:800;color:#1C2535;margin:16px 0 4px;}
.price span{font-size:14px;font-weight:400;color:#888;}
.features{margin:20px 0;padding:0;list-style:none;}
.features li{font-size:13.5px;color:#444;padding:6px 0;border-bottom:.5px solid #f0f0f0;display:flex;align-items:center;gap:8px;}
.features li:last-child{border-bottom:none;}
.features li::before{content:"✓";color:#0F6E56;font-weight:700;}
.divider{border:none;border-top:.5px solid #e8e8e8;margin:24px 0;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
input{width:100%;padding:12px 14px;border:1.5px solid #e0dfd8;border-radius:8px;font-size:14px;font-family:inherit;color:#1C2535;outline:none;transition:border .2s;}
input:focus{border-color:#534AB7;}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-primary{width:100%;padding:16px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s;}
.btn-primary:hover{background:#1D9E75;}
.btn-google{width:100%;padding:14px;background:#1C2535;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
.security{text-align:center;font-size:11px;color:#999;margin-top:16px;}
.logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;opacity:.6;}
.loading{display:none;text-align:center;padding:32px 20px;}
.spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#0F6E56;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.success-box{display:none;text-align:center;padding:32px 20px;}
.success-icon{font-size:52px;margin-bottom:16px;}
.success-box h2{font-size:22px;font-weight:700;color:#0F6E56;margin-bottom:8px;}
.success-box p{font-size:14px;color:#666;margin-bottom:24px;}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:12px 16px;font-size:13px;color:#991B1B;margin-bottom:16px;display:none;}
.login-box{text-align:center;padding:24px 0;display:none;}
.login-icon{font-size:42px;margin-bottom:12px;}
.login-box h2{font-size:18px;font-weight:700;color:#1C2535;margin-bottom:8px;}
.login-box p{font-size:13px;color:#666;margin-bottom:20px;}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">Valu<span>north</span></a>
  <a class="back" href="javascript:history.back()">← Geri</a>
</nav>

<div class="container">
  <div class="card">

    <div id="plan-info"></div>
    <hr class="divider">
    <div class="error-box" id="error-box"></div>

    <!-- GİRİŞ GEREKLİ -->
    <div class="login-box" id="login-box">
      <div class="login-icon">🔐</div>
      <h2>Ödeme için giriş yapın</h2>
      <p>Hesabınız yoksa kayıt olun, varsa giriş yapın.</p>

      <!-- Sekme seçimi -->
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button onclick="showTab('login')" id="tab-login" style="flex:1;padding:10px;background:#1C2535;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Giriş Yap</button>
        <button onclick="showTab('register')" id="tab-register" style="flex:1;padding:10px;background:#F5F4EF;color:#1C2535;border:1px solid #e0dfd8;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Kayıt Ol</button>
      </div>

      <!-- Giriş Formu -->
      <div id="tab-login-form">
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" id="login-email" placeholder="ornek@email.com">
        </div>
        <div class="form-group">
          <label>Şifre</label>
          <input type="password" id="login-password" placeholder="Şifreniz">
        </div>
        <button class="btn-primary" onclick="loginWithEmail()" style="margin-bottom:12px;">Giriş Yap</button>
        <div style="text-align:center;font-size:12px;color:#999;margin-bottom:12px;">— veya —</div>
        <button class="btn-google" onclick="loginWithGoogle()">🔑 Google ile Giriş Yap</button>
      </div>

      <!-- Kayıt Formu -->
      <div id="tab-register-form" style="display:none;">
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" id="reg-email" placeholder="ornek@email.com">
        </div>
        <div class="form-group">
          <label>Şifre (en az 6 karakter)</label>
          <input type="password" id="reg-password" placeholder="Şifre belirleyin">
        </div>
        <button class="btn-primary" onclick="registerWithEmail()" style="margin-bottom:12px;">Kayıt Ol</button>
        <div style="text-align:center;font-size:12px;color:#999;margin-bottom:12px;">— veya —</div>
        <button class="btn-google" onclick="loginWithGoogle()">🔑 Google ile Kayıt Ol</button>
      </div>
    </div>

    <!-- KART FORMU -->
    <div id="payment-form" style="display:none;">
      <div class="form-group">
        <label>Kart Üzerindeki Ad Soyad</label>
        <input type="text" id="card-name" placeholder="Ad Soyad">
      </div>
      <div class="form-group">
        <label>Kart Numarası</label>
        <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19">
      </div>
      <div class="card-row">
        <div class="form-group">
          <label>Son Kullanma (AA/YY)</label>
          <input type="text" id="card-expiry" placeholder="AA/YY" maxlength="5">
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="text" id="card-cvc" placeholder="123" maxlength="3">
        </div>
      </div>
      <button class="btn-primary" onclick="startPayment()">Güvenli Ödeme Yap</button>
      <div class="security">🔒 256-bit SSL şifreleme · PCI DSS uyumlu</div>
      <div class="logos">
        <svg height="20" viewBox="0 0 80 24" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="18" font-family="Arial" font-size="16" font-weight="bold" fill="#1A56DB">iyzico</text>
        </svg>
        <svg height="18" viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
          <rect width="60" height="20" rx="3" fill="#1A1F71"/>
          <text x="30" y="14" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">VISA</text>
        </svg>
        <svg height="22" viewBox="0 0 50 32" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="16" r="13" fill="#EB001B"/>
          <circle cx="30" cy="16" r="13" fill="#F79E1B"/>
          <path d="M25 6.8a13 13 0 0 1 0 18.4A13 13 0 0 1 25 6.8z" fill="#FF5F00"/>
        </svg>
      </div>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="color:#666;font-size:14px;">Ödemeniz işleniyor...</p>
    </div>

    <!-- BAŞARI -->
    <div class="success-box" id="success-box">
      <div class="success-icon">🎉</div>
      <h2>Ödeme Başarılı!</h2>
      <p id="success-msg"></p>
      <button class="btn-primary" style="max-width:240px;margin:0 auto;" onclick="goToPlatform()">Platforma Git →</button>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBl2UgqYBI3IGD2wbz_4rRkzcgvzyXnso8",
  authDomain: "valunorth-33840.firebaseapp.com",
  projectId: "valunorth-33840",
  storageBucket: "valunorth-33840.appspot.com",
  messagingSenderId: "857492635810",
  appId: "1:857492635810:web:valunorth"
});
var auth = firebase.auth();
var db = firebase.firestore();

var IYZICO_API_KEY = "sandbox-mZEb6oNFFrDbfQCCxyEqiu0RedGu3jcI";
var IYZICO_SECRET_KEY = "sandbox-OnK4JabsEEuyUxSptshQjO5bW8drGuyx";

var params = new URLSearchParams(window.location.search);
var plan = params.get("plan") || "plus";

var PLANS = {
  plus: {
    name: "Plus Paketi", price: "4.000", priceNum: 4000, badge: "Plus",
    cssClass: "plan-plus",
    features: ["Freemium'daki her şey","3 değerleme hakkı / yıl","Valunorth Girişim Skoru","8 senaryo + maliyet analizi","12 aylık aksiyon takvimi","Gelir büyüme projeksiyonu","Değerleme geçmişi + PDF rapor","Valunorth Rozeti"]
  },
  pro: {
    name: "Pro Paket", price: "7.500", priceNum: 7500, badge: "Pro",
    cssClass: "plan-pro",
    features: ["Plus'taki her şey","Sınırsız değerleme / yıl","AI Yatırımcı Simülasyonu","Pitch Deck Puanlama","Pitch Deck Skor + Öneriler"]
  }
};

var sel = PLANS[plan] || PLANS.plus;

document.getElementById("plan-info").innerHTML =
  '<div class="' + sel.cssClass + '">' +
  '<span class="plan-badge">' + sel.badge + '</span>' +
  '<h1>' + sel.name + '</h1>' +
  '<div class="price">₺' + sel.price + ' <span>/ yıl</span></div>' +
  '<ul class="features">' + sel.features.map(function(f){return '<li>'+f+'</li>';}).join("") + '</ul>' +
  '</div>';

document.getElementById("card-number").addEventListener("input", function(e){
  var v = e.target.value.replace(/\D/g,"").substring(0,16);
  e.target.value = v.replace(/(.{4})/g,"$1 ").trim();
});
document.getElementById("card-expiry").addEventListener("input", function(e){
  var v = e.target.value.replace(/\D/g,"").substring(0,4);
  if(v.length >= 3) v = v.substring(0,2) + "/" + v.substring(2);
  e.target.value = v;
});

var currentUser = null;

auth.onAuthStateChanged(function(user){
  currentUser = user;
  if(!user){
    document.getElementById("login-box").style.display = "block";
    document.getElementById("payment-form").style.display = "none";
  } else {
    document.getElementById("login-box").style.display = "none";
    document.getElementById("payment-form").style.display = "block";
  }
});

function showTab(tab){
  document.getElementById("tab-login-form").style.display = tab === "login" ? "block" : "none";
  document.getElementById("tab-register-form").style.display = tab === "register" ? "block" : "none";
  document.getElementById("tab-login").style.background = tab === "login" ? "#1C2535" : "#F5F4EF";
  document.getElementById("tab-login").style.color = tab === "login" ? "#fff" : "#1C2535";
  document.getElementById("tab-register").style.background = tab === "register" ? "#1C2535" : "#F5F4EF";
  document.getElementById("tab-register").style.color = tab === "register" ? "#fff" : "#1C2535";
}

function loginWithEmail(){
  hideError();
  var email = document.getElementById("login-email").value.trim();
  var pass  = document.getElementById("login-password").value;
  if(!email || !pass) return showError("E-posta ve şifre girin.");
  auth.signInWithEmailAndPassword(email, pass).catch(function(e){
    showError("Giriş başarısız: " + (e.code === "auth/wrong-password" ? "Şifre hatalı." : e.code === "auth/user-not-found" ? "Bu e-posta kayıtlı değil." : e.message));
  });
}

function registerWithEmail(){
  hideError();
  var email = document.getElementById("reg-email").value.trim();
  var pass  = document.getElementById("reg-password").value;
  if(!email || !pass) return showError("E-posta ve şifre girin.");
  if(pass.length < 6) return showError("Şifre en az 6 karakter olmalı.");
  auth.createUserWithEmailAndPassword(email, pass).catch(function(e){
    showError("Kayıt başarısız: " + (e.code === "auth/email-already-in-use" ? "Bu e-posta zaten kayıtlı." : e.message));
  });
}

function loginWithGoogle(){
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e){
    showError("Giriş başarısız: " + e.message);
  });
}

function showError(msg){
  var b = document.getElementById("error-box");
  b.textContent = msg;
  b.style.display = "block";
}
function hideError(){
  document.getElementById("error-box").style.display = "none";
}

function startPayment(){
  hideError();
  var cardName   = document.getElementById("card-name").value.trim();
  var cardNumber = document.getElementById("card-number").value.replace(/\s/g,"");
  var cardExpiry = document.getElementById("card-expiry").value;
  var cardCvc    = document.getElementById("card-cvc").value.trim();

  if(!cardName)            return showError("Lütfen kart üzerindeki adı girin.");
  if(cardNumber.length<16) return showError("Lütfen geçerli bir kart numarası girin.");
  if(!cardExpiry.includes("/") || cardExpiry.length<5) return showError("Son kullanma tarihini AA/YY formatında girin.");
  if(cardCvc.length<3)     return showError("Lütfen CVV kodunu girin.");
  if(!currentUser)         return showError("Lütfen önce giriş yapın.");

  var parts = cardExpiry.split("/");
  var expMonth = parts[0];
  var expYear  = "20" + parts[1];

  document.getElementById("payment-form").style.display = "none";
  document.getElementById("loading").style.display = "block";

  // Sandbox test simülasyonu
  // Gerçek iyzico entegrasyonu için backend gerekir
  setTimeout(function(){
    var isSuccess = cardNumber !== "5400010000000004";

    if(isSuccess){
      db.collection("users").doc(currentUser.uid).set({
        level: plan,
        plan_activated_at: new Date(),
        plan_expires_at: new Date(Date.now() + 365*24*60*60*1000),
        payment_ref: "sandbox-" + Date.now()
      }, { merge: true }).then(function(){
        document.getElementById("loading").style.display = "none";
        document.getElementById("success-box").style.display = "block";
        document.getElementById("success-msg").textContent =
          sel.name + " aktif edildi. Tüm " + sel.badge + " özelliklerine erişebilirsiniz.";
      });
    } else {
      document.getElementById("loading").style.display = "none";
      document.getElementById("payment-form").style.display = "block";
      showError("Ödeme başarısız: Yetersiz bakiye (test kartı)");
    }
  }, 2000);
}

function goToPlatform(){
  window.location.href = "startup_valuation_v10.html";
}
</script>
</body>
</html>
